services:
  db:
    image: postgres:16-alpine
    container_name: wedding-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: sayidanafeesa
    volumes:
      - wedding-postgres:/var/lib/postgresql/data

  wedding:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: wedding-app:latest
    container_name: wedding-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "127.0.0.1:3102:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      AVIATIONSTACK_ACCESS_KEY: ${AVIATIONSTACK_ACCESS_KEY:-}
      AIRLABS_API_KEY: ${AIRLABS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - wedding-uploads:/app/data/uploads
      - wedding-dumps:/app/data/dumps
      # Bind SCP upload target so Diagnostics restore sees the latest dump.
      - ${DEPLOY_TARGET_DIR:-./seeds}:/app/seeds

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUNNING_IN_CONTAINER: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  wedding-postgres:
  wedding-uploads:
  wedding-dumps:
