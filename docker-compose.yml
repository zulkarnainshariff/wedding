services:
  wedding:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: wedding-app:latest
    container_name: wedding-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3102:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      AVIATIONSTACK_ACCESS_KEY: ${AVIATIONSTACK_ACCESS_KEY:-}
      AIRLABS_API_KEY: ${AIRLABS_API_KEY:-}
    volumes:
      - wedding-uploads:/app/data/uploads
      - wedding-dumps:/app/data/dumps
      # Bind SCP upload target so Diagnostics restore sees the latest dump.
      - ${DEPLOY_TARGET_DIR:-./seeds}:/app/seeds

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}

volumes:
  wedding-uploads:
  wedding-dumps:
